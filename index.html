<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping ePaper</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col items-center p-4">

    <div class="w-full max-w-md">

        <!-- Header -->
        <h1 class="text-2xl font-bold text-center mb-4">
            🛒 Lista de compra
        </h1>

        <!-- Botón conectar -->
        <button id="connectBtn" class="w-full bg-blue-600 text-white py-2 rounded-xl shadow">
            Conectar STM32
        </button>

        <!-- Input añadir item -->
        <div class="flex mt-4 gap-2">
            <input id="itemInput" class="flex-1 p-2 rounded-lg border" placeholder="Añadir producto..." />

            <button id="addBtn" class="bg-green-600 text-white px-4 rounded-lg">
                +
            </button>
        </div>

        <!-- Lista -->
        <div id="list" class="mt-6 space-y-2">
        </div>

    </div>

    <script src="app.js"></script>
</body>

</html>
